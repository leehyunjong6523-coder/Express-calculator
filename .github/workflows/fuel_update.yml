name: Weekly Fuel Surcharge Update

on:
  schedule:
    - cron: "0 1 * * 1"   # 매주 월요일 오전 10시 (KST = UTC+9 → UTC 01:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update-fuel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fuel scraper & push to Render
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python .github/scripts/scrape_fuel.py
